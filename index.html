<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
        <h1>Student Notes App</h1>
    </header>

    <main class="main-content">
      <div class="input-area">
        <input id="noteTitle" placeholder="Title (optional)" />
        <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
        <div class="input-row">
          <input id="noteTags" placeholder="Tags (comma separated)" />
          <input id="noteSubject" placeholder="Subject / Category (optional)" />
        </div>
        <div class="input-row actions">
          <label><input type="checkbox" id="livePreviewToggle" /> Live preview</label>
          <div style="display:flex; align-items:center; gap:10px">
            <button onclick="addNote()">Add Note</button>
            <span id="saveStatus" class="save-status" aria-live="polite"></span>
          </div>
        </div>

        <div id="livePreview" class="live-preview" aria-hidden="true"></div>
      </div>

      <div class="backup-panel">
          <h3>Data Management</h3>
          <div class="backup-actions">
              <button onclick="exportNotes()" class="backup-btn">Export Backup</button>
              <label for="importFile" class="backup-btn">Import Backup</label>
              <input type="file" id="importFile" accept=".json" onchange="importNotes(event)" style="display: none;">
          </div>
      </div>

      <section class="search-area">
        <input id="searchInput" placeholder="Search notes by title or content..." />
        <div class="filters">
          <input id="filterTags" placeholder="Filter by tag (comma separated)" />
          <select id="filterSubject">
            <option value="">All subjects</option>
          </select>
        </div>
      </section>
    </main>

    <div id="notesContainer"></div>

    <footer class="site-footer">
        <p>© 2026 Student Notes App. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
</body>
</html>
