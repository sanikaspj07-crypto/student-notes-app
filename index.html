<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>Notes App</h1>

    <header class="site-header">
        <h1>Student Notes App</h1>
    </header>

    <div class="container">
      <div class="input-area">
        <input id="noteTitle" placeholder="Title (optional)" />
        <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
        <div class="input-row">
          <input id="noteTags" placeholder="Tags (comma separated)" />
          <input id="noteSubject" placeholder="Subject / Category (optional)" />
        </div>
        <div class="input-row actions">
          <label><input type="checkbox" id="livePreviewToggle" /> Live preview</label>
          <div style="display:flex; align-items:center; gap:10px">
            <button onclick="addNote()">Add Note</button>
            <span id="saveStatus" class="save-status" aria-live="polite"></span>
          </div>
        </div>

        <div id="livePreview" class="live-preview" aria-hidden="true"></div>
      </div>

      <section class="search-area">
        <input id="searchInput" placeholder="Search notes by title or content..." />
        <div class="filters">
          <input id="filterTags" placeholder="Filter by tag (comma separated)" />
          <select id="filterSubject">
            <option value="">All subjects</option>
          </select>
        </div>
          <div class="suggested-tags-area">
            <input id="newTagInput" placeholder="Add tag" />
            <button id="addTagBtn" type="button">Add Tag</button>
            <div id="suggestedTags" class="suggested-tags"></div>
          </div>
      </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 Student Notes App. All rights reserved.</p>
    </footer>

    <div id="notesContainer"></div>
  
    <section id="pinnedSection" class="pinned-section" aria-labelledby="pinnedHeading" style="display:none">
      <h2 id="pinnedHeading">Pinned Notes</h2>
      <div id="pinnedContainer"></div>
    </section>
    <section id="favoritesSection" class="favorites-section" aria-labelledby="favoritesHeading" style="display:none">
      <h2 id="favoritesHeading">Favorites</h2>
      <div id="favoritesContainer"></div>
    </section>
  </div>

  <script src="script.js"></script>
  <!-- Markdown renderer and sanitizer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
</body>
</html>
