<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>Notes App</h1>

    <header class="site-header">
        <h1>Student Notes App</h1>
    </header>

    <div class="container">
      <div class="input-area">
        <input id="noteTitle" placeholder="Title (optional)" />
        <textarea id="noteInput" placeholder="Write your note here..."></textarea>
        <input id="noteTags" placeholder="Tags (comma separated)" />
        <input id="noteSubject" placeholder="Subject / Category (optional)" />
        <button onclick="addNote()">Add Note</button>
      </div>

      <section class="search-area">
        <input id="searchInput" placeholder="Search notes by title or content..." />
        <div class="filters">
          <input id="filterTags" placeholder="Filter by tag (comma separated)" />
          <select id="filterSubject">
            <option value="">All subjects</option>
          </select>
        </div>
      </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 Student Notes App. All rights reserved.</p>
    </footer>

    <div id="notesContainer"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
